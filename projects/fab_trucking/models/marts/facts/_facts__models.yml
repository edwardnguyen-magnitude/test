version: 2

models:
  - name: fct_fab_trucking__truck_builds
    description: Truck build fact table with build timing and status
    config:
      meta:
        openmetadata:
          owner: [fab_trucking_ops, data-engineering]
          tier: Tier.Tier1
    columns:
      - name: truck_build_key
        description: Surrogate key for truck build
        data_tests:
          - unique
          - not_null
      - name: truck_build_id
        description: Natural key for truck build
        data_tests:
          - unique
          - not_null
      - name: vin
        description: Vehicle Identification Number
        data_tests:
          - unique
          - not_null
      - name: plant_id
        description: Foreign key to plant dimension
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__plants')
                field: plant_id
      - name: configuration_id
        description: Foreign key to configuration dimension
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__configurations')
                field: configuration_id
      - name: customer_id
        description: Foreign key to customer dimension
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__customers')
                field: customer_id

  - name: fct_fab_trucking__offline_cases
    description: Main fact table for offline truck cases with full context
    config:
