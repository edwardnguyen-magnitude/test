      - name: plant_id
        description: Foreign key to plant dimension
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__plants')
                field: plant_id

  - name: fct_fab_trucking__defects
    description: Defect fact table with severity and repair tracking
    config:
      meta:
        openmetadata:
          owner: [fab_trucking_ops, data-engineering]
          tier: Tier.Tier1
    columns:
      - name: defect_key
        description: Surrogate key for defect
        data_tests:
          - unique
          - not_null
      - name: defect_id
        description: Natural key for defect
        data_tests:
          - unique
          - not_null
      - name: plant_id
        description: Foreign key to plant dimension
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__plants')
                field: plant_id

  - name: fct_fab_trucking__paint_operations
    description: Paint operation fact table with duration and rework tracking
    config:
      meta:
        openmetadata:
          owner: [fab_trucking_ops, data-engineering]
          tier: Tier.Tier1
    columns:
      - name: paint_operation_key
        description: Surrogate key for paint operation
        data_tests:
          - unique
          - not_null
      - name: paint_operation_id
        description: Natural key for paint operation
        data_tests:
          - unique
          - not_null
      - name: vin
        description: Vehicle Identification Number
        data_tests:
          - not_null
      - name: plant_id
        description: Foreign key to plant dimension
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__plants')
                field: plant_id
      - name: workcenter_id
        description: Foreign key to workcenter dimension
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__workcenters')
                field: workcenter_id
      - name: paint_code
        description: Paint color/type code
        data_tests:
          - not_null
      - name: paint_result
        description: Result of paint operation (OK, REWORK_REQUIRED)
        data_tests:
          - accepted_values:
              arguments:
                values: ['OK', 'REWORK_REQUIRED']

  - name: fct_fab_trucking__warranty_claims
    description: Warranty claim fact table with cost and duration tracking
    config:
      meta:
        openmetadata:
          owner: [fab_trucking_ops, data-engineering]
          tier: Tier.Tier1
    columns:
      - name: warranty_claim_key
        description: Surrogate key for warranty claim
        data_tests:
          - unique
          - not_null
      - name: warranty_claim_id
        description: Natural key for warranty claim
        data_tests:
          - unique
          - not_null
      - name: vin
        description: Vehicle Identification Number
        data_tests:
          - not_null
      - name: customer_id
        description: Foreign key to customer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__customers')
                field: customer_id
      - name: claim_status
        description: Current status of the warranty claim
        data_tests:
          - accepted_values:
              arguments:
                values: ['OPEN', 'IN_REVIEW', 'CLOSED', 'DENIED']
      - name: cost_amount
        description: Cost amount of the warranty claim
