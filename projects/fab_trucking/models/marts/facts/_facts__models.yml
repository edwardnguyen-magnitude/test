          - not_null
      - name: vin
        description: Vehicle Identification Number
        data_tests:
          - not_null
      - name: plant_id
        description: Foreign key to plant dimension
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__plants')
                field: plant_id
      - name: configuration_id
        description: Foreign key to configuration dimension
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__configurations')
                field: configuration_id
      - name: customer_id
        description: Foreign key to customer dimension
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__customers')
                field: customer_id

  - name: fct_fab_trucking__material_shortages
    description: Material shortage fact table with impact analysis
    config:
      meta:
        openmetadata:
          owner: [fab_trucking_ops, data-engineering]
          tier: Tier.Tier1
    columns:
      - name: shortage_key
        description: Surrogate key for shortage
        data_tests:
          - unique
          - not_null
      - name: shortage_id
        description: Natural key for shortage
        data_tests:
          - unique
          - not_null

  - name: fct_fab_trucking__inspections
    description: Inspection event fact table
    config:
      meta:
        openmetadata:
          owner: [fab_trucking_ops, data-engineering]
          tier: Tier.Tier1
    columns:
      - name: inspection_key
        description: Surrogate key for inspection
        data_tests:
          - unique
          - not_null
      - name: inspection_event_id
        description: Natural key for inspection (canonical)
        data_tests:
          - unique
          - not_null
      - name: plant_id
        description: Foreign key to plant dimension
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fab_trucking__plants')
