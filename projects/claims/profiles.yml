default:
  # Switch to ClickHouse for compile/testing via environment variables.
  target: clickhouse
  outputs:
    clickhouse:
      type: clickhouse
      host: "{{ env_var('DBT_HOST') }}"
      port: "{{ env_var('DBT_PORT') | int }}"
      user: "{{ env_var('DBT_USER') }}"
      password: "{{ env_var('DBT_PASSWORD') }}"
      # ClickHouse requires database to be omitted or equal to schema.
      database: "{{ env_var('DBT_DATABASE') }}"
      schema: "{{ env_var('DBT_DATABASE') }}"
      threads: 4
    source:
      # Use ClickHouse for the canonical source connection as well.
      type: clickhouse
      host: "{{ env_var('DBT_HOST') }}"
      port: "{{ env_var('DBT_PORT') | int }}"
      user: "{{ env_var('DBT_USER') }}"
      password: "{{ env_var('DBT_PASSWORD') }}"
      # ClickHouse requires database to be omitted or equal to schema.
      database: "{{ env_var('DBT_SOURCE_SCHEMA', env_var('DBT_DATABASE')) }}"
      schema: "{{ env_var('DBT_SOURCE_SCHEMA', env_var('DBT_DATABASE')) }}"
      threads: 4
