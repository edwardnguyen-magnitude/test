default:
  # Switch to ClickHouse for compile/testing via environment variables.
  target: clickhouse
  outputs:
    clickhouse:
      type: clickhouse
      host: "{{ env_var('DBT_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_PORT', '8123') | int }}"
      user: "{{ env_var('DBT_USER', 'default') }}"
      password: "{{ env_var('DBT_PASSWORD', '') }}"
      # ClickHouse requires database to be omitted or equal to schema.
      # Force ClickHouse database to match the source schema (configurable).
      # Use DBT_DATABASE (default 'fabrion') for ClickHouse target database/schema.
      database: "{{ env_var('DBT_DATABASE', 'fabrion') }}"
      schema: "{{ env_var('DBT_DATABASE', 'fabrion') }}"
      threads: 4
    source:
      # Use ClickHouse for the canonical source connection as well.
      type: clickhouse
      host: "{{ env_var('DBT_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_PORT', '8123') | int }}"
      user: "{{ env_var('DBT_USER', 'default') }}"
      password: "{{ env_var('DBT_PASSWORD', '') }}"
      # ClickHouse requires database to be omitted or equal to schema.
      # Default to DBT_SOURCE_SCHEMA if provided, otherwise fall back to DBT_DATABASE ('fabrion').
      database: "{{ env_var('DBT_SOURCE_SCHEMA', env_var('DBT_DATABASE', 'fabrion')) }}"
      schema: "{{ env_var('DBT_SOURCE_SCHEMA', env_var('DBT_DATABASE', 'fabrion')) }}"
      threads: 4
